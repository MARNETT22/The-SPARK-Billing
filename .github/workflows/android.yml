name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04 # Switch back to a more stable version for Buildozer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev zlib1g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libjpeg-dev libfreetype6-dev libsqlite3-dev libtool autoconf automake pkg-config \
            libtool-bin libssl-dev libffi-dev libbz2-dev libunwind-dev liblzma-dev \
            libxml2-dev libxslt1-dev openjdk-17-jdk
          pip3 install --user --upgrade Cython==0.29.33 buildozer setuptools virtualenv

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-v5-${{ hashFiles('buildozer.spec') }}

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Buildozer needs a clean state when switching envs
          buildozer android clean
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SparkBilling-APK
          path: bin/*.apk
