name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libjpeg-dev \
            libfreetype6-dev \
            libsqlite3-dev \
            libtool \
            autoconf \
            automake \
            pkg-config \
            libtool-bin \
            libssl-dev \
            libffi-dev \
            libbz2-dev \
            libunwind-dev \
            liblzma-dev \
            libxml2-dev \
            libxslt1-dev \
            openjdk-17-jdk \
            zip \
            unzip \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer setuptools virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Clean any partial build but keep downloads if possible (though we deleted .buildozer above)
          # We'll use a more reliable way to run buildozer
          buildozer android debug || (tail -n 1000 .buildozer/android/platform/build-armeabi-v7a_arm64-v8a/dists/sparkbilling__armeabi-v7a_arm64-v8a/build.log && exit 1)

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SparkBilling-APK
          path: bin/*.apk

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: .buildozer/android/platform/build-armeabi-v7a_arm64-v8a/dists/*/build.log
